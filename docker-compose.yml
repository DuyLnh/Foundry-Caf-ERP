services:
  db:
    image: postgres:15
    container_name: odoo17_postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo_secret_2026
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
  odoo:
    image: odoo:17
    container_name: odoo17_app
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ./addons:/mnt/extra-addons
      - ./config:/etc/odoo
      - odoo-web-data:/var/lib/odoo
     
    restart: unless-stopped
volumes:
  postgres-data:
  odoo-web-data:
  